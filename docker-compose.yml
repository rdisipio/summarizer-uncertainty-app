services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: summarizer-backend
    ports:
      - "8000:8000"

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        VITE_API_BASE_URL: /api
    container_name: summarizer-frontend
    depends_on:
      - backend
    ports:
      - "8080:80"
